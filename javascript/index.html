<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Community Event Portal</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
body{
    font-family:Arial, sans-serif;
    margin:20px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

.controls{
    margin:20px 0;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.error{
    color:red;
    font-size:14px;
}

.success{
    color:green;
}

#spinner{
    display:none;
    font-weight:bold;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<h1>Local Community Event Portal</h1>

<!-- FILTERS -->
<div class="controls">

<select id="categoryFilter">
<option value="All">All Categories</option>
<option value="Music">Music</option>
<option value="Workshop">Workshop</option>
<option value="Sports">Sports</option>
</select>

<input
type="text"
id="searchBox"
placeholder="Search event..."
>

<button id="loadEventsBtn">
Load Remote Events
</button>

</div>

<div id="spinner">Loading Events...</div>

<div id="eventsContainer"></div>

<hr>

<h2>Register For Event</h2>

<form id="registrationForm">

<input
type="text"
name="name"
placeholder="Your Name"
><br><br>

<input
type="email"
name="email"
placeholder="Email"
><br><br>

<select name="event">
<option value="">Select Event</option>
</select>

<br><br>

<button id="registerBtn" type="submit">
Register
</button>

</form>

<div id="errors"></div>
<div id="result"></div>

<script src="main.js"></script>

<script>

/* ==========================================
1. BASICS & SETUP
========================================== */

console.log("Welcome to the Community Portal");

window.addEventListener("load", () => {
    alert("Community Portal Loaded Successfully");
});


/* ==========================================
2. DATA TYPES & OPERATORS
========================================== */

const portalName = "Community Event Portal";

const portalDate = "2026";

let totalSeats = 100;

console.log(
`${portalName} - ${portalDate}
Available Seats: ${totalSeats}`
);


/* ==========================================
5. OBJECTS & PROTOTYPES
========================================== */

class Event {

    constructor(id,name,category,location,date,seats){

        this.id=id;
        this.name=name;
        this.category=category;
        this.location=location;
        this.date=date;
        this.seats=seats;
    }
}

Event.prototype.checkAvailability=function(){

    return this.seats>0;
};


/* ==========================================
6. ARRAY METHODS
========================================== */

let events=[];

events.push(
new Event(
1,
"Music Night",
"Music",
"Town Hall",
"2027-01-10",
50
)
);

events.push(
new Event(
2,
"Baking Workshop",
"Workshop",
"Community Center",
"2027-02-05",
20
)
);

events.push(
new Event(
3,
"Football Match",
"Sports",
"City Ground",
"2027-03-01",
0
)
);

const musicEvents=
events.filter(
e=>e.category==="Music"
);

console.log("Music Events",musicEvents);

const formatted=
events.map(
e=>`Workshop on ${e.name}`
);

console.log(formatted);


/* ==========================================
4. FUNCTIONS
========================================== */

function addEvent(event){

    events.push(event);

    renderEvents();
}


function registerUser(eventId){

    try{

        let event=
        events.find(
        e=>e.id===eventId
        );

        if(!event)
            throw new Error("Event not found");

        if(event.seats<=0)
            throw new Error("No seats available");

        event.seats--;

        renderEvents();

        console.log("Registered");

    }
    catch(error){

        alert(error.message);
    }
}


function filterEventsByCategory(
category,
callback
){

    let filtered=
    category==="All"
    ? events
    : events.filter(
    e=>e.category===category
    );

    callback(filtered);
}


/* ==========================================
CLOSURE
========================================== */

function registrationTracker(){

    let count=0;

    return function(){

        count++;

        return count;
    };
}

const musicCounter=
registrationTracker();


/* ==========================================
7. DOM MANIPULATION
========================================== */

const eventsContainer=
document.querySelector(
"#eventsContainer"
);


function renderEvents(
data=events
){

eventsContainer.innerHTML="";

data.forEach(event=>{

const card=
document.createElement("div");

card.className="card";

card.innerHTML=`
<h3>${event.name}</h3>
<p>Category:
${event.category}</p>

<p>Location:
${event.location}</p>

<p>Seats:
${event.seats}</p>

<button
onclick="registerUser(${event.id})">
Register
</button>
`;

eventsContainer.appendChild(card);

});

populateDropdown();
}


function populateDropdown(){

const dropdown=
document.querySelector(
'select[name="event"]'
);

dropdown.innerHTML=
'<option value="">Select Event</option>';

events.forEach(event=>{

dropdown.innerHTML+=
`
<option value="${event.name}">
${event.name}
</option>
`;
});
}


/* ==========================================
3. CONDITIONALS LOOPS ERROR HANDLING
========================================== */

function showValidEvents(){

let validEvents=[];

events.forEach(event=>{

if(
new Date(event.date)>
new Date()
&& event.seats>0
){

validEvents.push(event);
}

});

renderEvents(validEvents);
}

showValidEvents();


/* ==========================================
8. EVENT HANDLING
========================================== */

document
.getElementById("categoryFilter")
.onchange=function(){

filterEventsByCategory(
this.value,
renderEvents
);

};


document
.getElementById("searchBox")
.addEventListener(
"keydown",
function(){

setTimeout(()=>{

const keyword=
this.value.toLowerCase();

const filtered=
events.filter(
e=>
e.name.toLowerCase()
.includes(keyword)
);

renderEvents(filtered);

},50);

});


/* ==========================================
9. ASYNC JS
========================================== */

function fetchEventsPromise(){

document
.getElementById("spinner")
.style.display="block";

fetch(
"https://jsonplaceholder.typicode.com/posts"
)

.then(response=>response.json())

.then(data=>{

console.log(
"Fetched Events",
data.slice(0,3)
);

})

.catch(error=>{

console.error(error);

})

.finally(()=>{

document
.getElementById("spinner")
.style.display="none";

});
}


async function fetchEventsAsync(){

try{

document
.getElementById("spinner")
.style.display="block";

const response=
await fetch(
"https://jsonplaceholder.typicode.com/posts"
);

const data=
await response.json();

console.log(
"Async Events",
data.slice(0,3)
);

}
catch(error){

console.error(error);

}
finally{

document
.getElementById("spinner")
.style.display="none";
}
}


document
.getElementById("loadEventsBtn")
.addEventListener(
"click",
fetchEventsAsync
);


/* ==========================================
10. MODERN JS
========================================== */

function displayEvent(
{name,category}
){

console.log(
name,
category
);
}

displayEvent(events[0]);

const clonedEvents=
[...events];


/* ==========================================
11. FORMS
========================================== */

document
.getElementById("registrationForm")
.addEventListener(
"submit",
function(event){

event.preventDefault();

console.log(
"Form Submission Started"
);

const form=
event.target;

const name=
form.elements.name.value.trim();

const email=
form.elements.email.value.trim();

const selectedEvent=
form.elements.event.value;

let errors=[];

if(name==="")
errors.push(
"Name Required"
);

if(email==="")
errors.push(
"Email Required"
);

if(selectedEvent==="")
errors.push(
"Select Event"
);

const errorDiv=
document.getElementById(
"errors"
);

errorDiv.innerHTML="";

if(errors.length){

errors.forEach(err=>{

errorDiv.innerHTML+=
`<div class="error">
${err}
</div>`;
});

return;
}


/* ==========================================
12. AJAX & FETCH API
========================================== */

console.log(
"Sending Registration"
);

setTimeout(async()=>{

try{

const response=
await fetch(
"https://jsonplaceholder.typicode.com/posts",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
name,
email,
selectedEvent
})
}
);

const data=
await response.json();

console.log(
"Payload",
data
);

document
.getElementById("result")
.innerHTML=
'<p class="success">Registration Successful</p>';

}
catch(error){

document
.getElementById("result")
.innerHTML=
'<p class="error">Registration Failed</p>';

console.error(error);
}

},1000);

});


/* ==========================================
13. DEBUGGING NOTES
========================================== */

console.log(
"Use DevTools Console"
);

console.log(
"Use Network Tab"
);

console.log(
"Inspect Payload"
);


/* ==========================================
14. JQUERY
========================================== */

$("#registerBtn").click(function(){

console.log(
"jQuery Click Detected"
);

});


$("#eventsContainer")
.mouseenter(function(){

$(".card").fadeIn();

});


$("#eventsContainer")
.mouseleave(function(){

$(".card").fadeOut();

setTimeout(()=>{
$(".card").fadeIn();
},500);

});


/*
Framework Benefit:

React/Vue provide:

1. Component Reusability
2. Better State Management
3. Faster UI Updates
4. Scalable Architecture

*/

</script>

</body>
</html>
